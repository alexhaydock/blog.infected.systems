# $NetBSD: nintendo.conf,v 1.2 2026/01/10 22:46:49 jmcneill Exp $
# Nintendo PowerPC customization script used by mkimage
#
board=nintendo
resize=true
swap=true
swap_size_MB=128
swap_file=/swap
fsize=4096
bsize=4096
ffsversion=2

. ${DIR}/conf/evbppc.conf

make_label() {
	make_label_evbppc
}

make_fstab() {
	make_fstab_evbppc

	cat >> ${mnt}/etc/fstab << EOF
${swap_file} none swap sw,priority=1 0 0
EOF
}

updatespec() {
	local pathname="$1"

	# Takes an argument and checks that path for files, writing them to the
	# specfile so that the image build/validation process is aware of anything
	# we've newly added to the image
	find "${mnt}${pathname}" | while read f; do
		rel=".${f#${mnt}}"
		# Note: We need to check if a file is a link first because -f also matches
		#       symlinks, and nbmakefs will throw an error if the spec declares a
		#       file where something is actually a symlink.
		if [ -L "$f" ]; then
			tgt=$(readlink "$f")
			echo "${rel} type=link uid=0 gid=0 mode=0755 link=${tgt}"
		elif [ -d "$f" ]; then
			echo "${rel} type=dir uid=0 gid=0 mode=0755"
		# Default to files being 0644 unless they're in a well-known binary path
		elif [ -f "$f" ]; then
			mode=0644
			case "$rel" in
				./usr/pkg/bin/*|./usr/pkg/sbin/*|./bin/*|./sbin/*|./etc/rc.d/*)
					mode=0755
					;;
			esac
			echo "${rel} type=file uid=0 gid=0 mode=${mode}"
		fi
	done >> "$tmp/selected_sets"
}

pkg_inject() {
	local pkgname="$1"

	# Make this function aware of the pkg_add binary we built earlier
	local PATH="/usr/pkg/bin:/usr/pkg/sbin:$PATH"

	# This won't naturally propagate to pkg_add's environment so we need to add it
	# to the start of that line too (probably being over-cautious but I'm using
	# the local vars here to avoid polluting any of the build environment outside
	# of this function)
	local PKGPATH="http://cdn.NetBSD.org/pub/pkgsrc/packages/NetBSD/evbppc/11.0/All/"

	# Download and inject the package we passed as the argument to this function
	PKG_PATH="${PKGPATH}" pkg_add -v -m evbppc -K "${mnt}/usr/pkg/pkgdb" -p "${mnt}/usr/pkg" -I -f "${pkgname}"
}

customize() {
	customize_evbppc

	# Disable lots of services to save RAM
	cat >> "${mnt}/etc/rc.conf" << EOF
bluetooth=NO
devpubd=NO
dhcpcd=NO
inetd=NO
lighttpd=YES
makemandb=NO
mdnsd=NO
postfix=NO
wscons=YES
EOF
	updatespec /etc/rc.conf
	
	# Configure ethernet statically
	cat > "${mnt}/etc/ifconfig.axe0" << EOF
inet6 2a11:f2c0:ffcc::4 prefixlen 64 alias
EOF
	updatespec /etc/ifconfig.axe0

	# Allow SSH with keys
	mkdir -p "${mnt}/root/.ssh/"
	cat > "${mnt}/root/.ssh/authorized_keys" << EOF
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDg/3otuTjnvlDfL0JdezCpBiM4G41gt+K+HuYT79ObD ed25519
EOF
	echo "./root/.ssh type=dir uid=0 gid=0 mode=0700" \
	  >> "$tmp/selected_sets"
	echo "./root/.ssh/authorized_keys type=file uid=0 gid=0 mode=0600" \
	  >> "$tmp/selected_sets"

	# Disable mailer
	cat > "${mnt}/etc/mailer.conf" << EOF
sendmail   /bin/true
mailq      /bin/true
newaliases /bin/true
EOF
	updatespec /etc/mailer.conf

	# Inject binary packages into image
	pkg_inject bsdfetch
	pkg_inject curl
	pkg_inject lighttpd
	updatespec /usr/pkg

	# Install default lighttpd rc.d script
	cp -fv "${mnt}/usr/pkg/share/examples/rc.d/lighttpd" "${mnt}/etc/rc.d/lighttpd"
	# For some reason, the default rc.d service script ships with `/usr/pkg` prepended
	# to the config file location, while all of the config files themselves assume `/etc/lighttpd`
	sed -i 's|^conf_file=.*|conf_file="/etc/lighttpd/lighttpd.conf"|' "${mnt}/etc/rc.d/lighttpd"
	updatespec /etc/rc.d/lighttpd
	
	# Install lighttpd default config to /etc/lighttpd
	mkdir "${mnt}/etc/lighttpd"
	cp -rfv "${mnt}/usr/pkg/share/examples/lighttpd/." "${mnt}/etc/lighttpd/"
	# One of the conf files has a similar prefix issue to the rc.d service unit
	sed -i 's|^var.conf_dir.*|var.conf_dir    = "/etc/lighttpd"|' "${mnt}/etc/lighttpd/lighttpd.annotated.conf"
	updatespec /etc/lighttpd

	# Create lighttpd log dir owned by 1000:1000 (lighttpd)
	mkdir -p "${mnt}/var/log/lighttpd"
	echo "./var/log/lighttpd type=dir uid=1000 gid=1000 mode=0755" \
	  >> "$tmp/selected_sets"

	# Create lighttpd user and group
	# Copy the existing master.passwd from the release dir since we won't have one
	# in the build dir and we'll end up *only* creating the lighttpd user
	cp "${release}/etc/master.passwd" "${mnt}/etc/master.passwd"
	# Note this is a 10-field format that is *slightly* different to the 7 fields in /etc/passwd
	# See: https://github.com/NetBSD/src/blob/3604f3d8178e005847b7c7a1c4e4fa20838cecb8/etc/master.passwd
	echo 'lighttpd:*:1000:1000::0:0:lighttpd user:/nonexistent:/sbin/nologin' >> "${mnt}/etc/master.passwd"
	# Rebuild password db using helper from mkimage script
	# This command is not super portable as -B controls byte order of the resulting
	# db (it forces big-endian which we need for the Wii's CPU)
	${PWD_MKDB} -p -B -d "${mnt}" "${mnt}/etc/master.passwd"
	echo 'lighttpd:*:1000:' >> "${mnt}/etc/group"
	# Register the world-readable files so makefs includes them
	updatespec /etc/group
	updatespec /etc/passwd
	updatespec /etc/pwd.db
	# The shadow database equivalents should not be world-readable
	for f in master.passwd spwd.db; do
		echo "./etc/${f} type=file uid=0 gid=0 mode=0600" \
			>> "$tmp/selected_sets"
	done

	# Add web content (we already placed it at /site inside our build
	# container as part of the multi-stage Dockerfile)
	mkdir -p "${mnt}/srv/www/htdocs"
	cp -rfv "/site/." "${mnt}/srv/www/htdocs/"
	updatespec /srv
}

populate_wii() {
	echo "${bar} looking for kernel in ${kernel} ${bar}"
	k="${kernel}/netbsd-NINTENDO.gz"

	# install files to /boot partition
	tgt="apps/netbsd/boot.elf"
	echo "${bar} installing ${k} to /boot/${tgt} ${bar}"
	mkdir -p "${mnt}/boot/apps/netbsd"
	case "${k}" in
	*.gz)
		${GZIP_CMD} -dc "${k}" > "${mnt}/boot/${tgt}"
		;;
	*)
		cp "${k}" "${mnt}/boot/${tgt}"
		;;
	esac

	# Metadata for HBC
	cp ${DIR}/files/evbppc_wii_meta.xml ${mnt}/boot/apps/netbsd/meta.xml
	cp ${DIR}/files/evbppc_wii_icon.png ${mnt}/boot/apps/netbsd/icon.png

	# MINI bootloader
	mkdir -p "${mnt}/boot/bootmii"
	cp "${release}/usr/mdec/ppcboot.elf" "${mnt}/boot/bootmii/ppcboot.elf"
}

populate_wiiu() {
	echo "${bar} looking for kernel in ${kernel} ${bar}"
	k="${kernel}/netbsd-NINTENDO.MP.gz"

	# install files to /boot partition
	tgt="netbsd"
	echo "${bar} installing ${k} to /boot/${tgt} ${bar}"
	mkdir -p "${mnt}/boot"
	case "${k}" in
	*.gz)
		${GZIP_CMD} -dc "${k}" > "${mnt}/boot/${tgt}"
		;;
	*)
		cp "${k}" "${mnt}/boot/${tgt}"
		;;
	esac

	# Linux-loader config
	mkdir -p "${mnt}/boot/linux"
	cat >> "${mnt}/boot/linux/boot.cfg" << EOF
[loader]
default=netbsd

[profile:netbsd]
name=NetBSD
kernel=sdmc:/netbsd
cmdline=root=ld0a
EOF
}

populate() {
	populate_wii
	populate_wiiu

	# Add swap space
	rm -f ${mnt}${swap_file}
	dd if=/dev/zero of=${mnt}${swap_file} bs=1 count=1 \
		seek=$((${swap_size_MB} * 1024 * 1024 - 1))
	echo ".${swap_file} type=file uid=0 gid=0 mode=0600" \
			>> "$tmp/selected_sets"
}
