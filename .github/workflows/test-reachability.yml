---
name: test-blog-reachability

on:
  # Allow manual triggers
  workflow_dispatch:
  # Run every day at 04:44
  schedule:
    - cron: '44 4 * * *'

jobs:
  test_site:
    name: Run tests against blog.infected.systems
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Cloudflare Warp because GitHub still haven't got native IPv6 working which is truly insane
        uses: fscarmen/warp-on-actions@v1.4
        timeout-minutes: 5  # Fairly aggressive timeout as this step sometimes fails

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            aioquic \
            httpx \
            pytest \
            pytest-asyncio

      - name: Run domain based tests (skip the HTTP/3 test since we can't use UDP for some reason)
        run: |
          pytest -v tests/test_domains.py
